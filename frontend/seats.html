<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats | CineTick</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--bg-main);">
    <div id="loader" class="loader-container"><div class="loader"></div></div>
    <nav id="navbar" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">CineTick</a></div>
        <div class="nav-links nav-right"></div>
    </nav>
    
    <!-- Background Poster -->
    <div class="poster-bg">
        <img id="pageBackdrop" src="" alt="" referrerpolicy="no-referrer">
    </div>

    <main class="container" style="margin-top: 100px; padding-bottom: 120px;">
        <h2 style="text-align: center; font-size: 2.2rem; margin-bottom: 3rem;">Select Your Magic Spots</h2>
        
        <div class="screen-container">
            <div class="screen"></div>
            <p style="color: var(--text-gray); font-size: 0.7rem; letter-spacing: 5px; margin-top: 1rem;">SCREEN THIS WAY</p>
        </div>
        
        <div id="seatsGrid" class="seats-grid"></div>
        
        <div style="display:flex; justify-content:center; gap:3rem; margin-top: 3rem;">
            <ul class="legend" style="margin:0;"><li class="legend-item"><div class="legend-box available"></div> Available</li></ul>
            <ul class="legend" style="margin:0;"><li class="legend-item"><div class="legend-box selected" style="background:var(--primary);"></div> Selected</li></ul>
            <ul class="legend" style="margin:0;"><li class="legend-item"><div class="legend-box booked" style="background:#333;"></div> Booked</li></ul>
        </div>

        <div style="display:flex; justify-content:center; gap:2rem; margin-top: 1rem;">
            <div style="font-size:0.8rem; color:#ff9800;">■ Platinum (1.5x)</div>
            <div style="font-size:0.8rem; color:#fbc02d;">■ Gold (1.25x)</div>
            <div style="font-size:0.8rem; color:#9e9e9e;">■ Silver (1.0x)</div>
        </div>
    </main>

    <div id="bookingBar" style="position:fixed; bottom:0; left:0; width:100%; padding:2rem 5%; background:rgba(15,15,15,0.95); backdrop-filter:blur(20px); border-top:1px solid #333; display:none; z-index:1000; animation: slideUp 0.4s ease-out;">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <p id="selectionText" style="color:var(--text-gray); font-size:1rem;"></p>
                <p id="totalPrice" style="font-size:1.8rem; font-weight:800; color:white; margin-top:5px;"></p>
            </div>
            <button onclick="proceedToSummary()" class="btn btn-primary" style="padding: 1rem 4rem; font-size: 1.1rem; border-radius: 12px; font-weight:700;">PROCEED</button>
        </div>
    </div>
    
    <div id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const showId = urlParams.get('id');
        if (!showId) window.location.href = 'index.html';
        
        let selectedSeats = [];
        let basePrice = 0;

        async function init() {
            try {
                const res = await Api.getShowSeats(showId);
                const seats = res.seats;
                basePrice = res.price_base;

                // Set immersive backdrop
                if (res.poster_url) {
                    document.getElementById('pageBackdrop').src = `${API_URL}/proxy/image?url=${encodeURIComponent(res.poster_url)}`;
                }

                const container = document.getElementById('seatsGrid');
                container.innerHTML = '';
                
                if (seats.length === 0) {
                    container.innerHTML = '<p style="grid-column: span 10; text-align:center; padding: 5rem; opacity:0.3;">No seats available for this show. Contact support.</p>';
                    return;
                }

                seats.forEach(seat => {
                    const seatEl = document.createElement('div');
                    seatEl.classList.add('seat');
                    seatEl.dataset.type = seat.seat_type;
                    seatEl.classList.add(seat.status.toLowerCase());
                    seatEl.textContent = seat.seat_number;
                    
                    if (seat.status === 'Available') {
                        seatEl.onclick = () => toggleSeat(seatEl, seat);
                    }
                    container.appendChild(seatEl);
                });
            } catch (err) { console.error(err); } finally { document.getElementById('loader').style.display = 'none'; }
        }
        
        function toggleSeat(seatEl, seat) {
            if (seatEl.classList.contains('selected')) {
                seatEl.classList.remove('selected');
                selectedSeats = selectedSeats.filter(s => s.seat_id !== seat.seat_id);
            } else {
                seatEl.classList.add('selected');
                selectedSeats.push(seat);
            }
            updateSelection();
        }
        
        function updateSelection() {
            const bar = document.getElementById('bookingBar');
            if (selectedSeats.length > 0) {
                bar.style.display = 'block';
                document.getElementById('selectionText').textContent = `SELECTED: ${selectedSeats.map(s => s.seat_number).join(', ')}`;
                const total = selectedSeats.reduce((sum, s) => sum + (basePrice * s.price_multiplier), 0);
                document.getElementById('totalPrice').textContent = `₹${total.toFixed(2)}`;
            } else { bar.style.display = 'none'; }
        }
        
        function proceedToSummary() {
            const total = selectedSeats.reduce((sum, s) => sum + (basePrice * s.price_multiplier), 0);
            window.location.href = `summary.html?showId=${showId}&seats=${selectedSeats.map(s => s.seat_id).join(',')}&seatNums=${selectedSeats.map(s => s.seat_number).join(',')}&total=${total}`;
        }
        init();
    </script>
</body>
</html>

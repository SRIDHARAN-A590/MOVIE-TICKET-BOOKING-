<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | CineTick</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loader" class="loader-container"><div class="loader"></div></div>

    <!-- Immersive Background -->
    <div class="poster-bg">
        <img id="pageBackdrop" src="" alt="" referrerpolicy="no-referrer">
    </div>

    <nav id="navbar" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">CineTick</a></div>
    </nav>

    <main class="container" style="display:flex; align-items:center; justify-content:center; min-height: 80vh;">
        <div class="summary-card" style="max-width: 500px; padding: 3rem; background: rgba(20,20,20,0.7); backdrop-filter: blur(30px); border-radius: 24px;">
            <h2 style="text-align:center; font-size: 2rem; margin-bottom: 2rem;">Secure Payment</h2>
            
            <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 16px; margin-bottom: 2.5rem; border-left: 5px solid var(--primary);">
                <p style="color:var(--text-gray); font-size:0.9rem; margin-bottom: 0.5rem;">Amount to Pay</p>
                <h3 id="payAmount" style="font-size: 2.5rem; color: white; line-height:1;"></h3>
            </div>

            <form id="paymentForm">
                <div class="form-group">
                    <label style="color:var(--text-gray); font-size: 0.9rem;">Card Number</label>
                    <input type="text" id="cardNumber" class="form-control" style="background:#111; letter-spacing: 3px;" placeholder="4444 4444 4444 4444" maxlength="19" required>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="form-group">
                        <label style="color:var(--text-gray); font-size: 0.9rem;">Expiry Date</label>
                        <input type="text" id="expiry" class="form-control" style="background:#111;" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label style="color:var(--text-gray); font-size: 0.9rem;">CVV</label>
                        <input type="password" id="cvv" class="form-control" style="background:#111;" placeholder="***" maxlength="3" required>
                    </div>
                </div>
                
                <button type="submit" id="payBtn" class="btn btn-primary" style="width:100%; padding:1.2rem; font-size:1.2rem; margin-top:2.5rem; border-radius: 12px; font-weight:700;">
                    PAY SECURELY
                </button>
            </form>
            
            <p style="text-align:center; color:var(--text-gray); font-size:0.8rem; margin-top:2rem; opacity:0.6;">
                🔒 SSL Encrypted & Secure Payment
            </p>
        </div>
    </main>

    <div id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('bookingId');
        const amount = urlParams.get('amount');
        const poster = urlParams.get('poster');

        if (!bookingId) window.location.href = 'index.html';

        // Set UI
        document.getElementById('payAmount').textContent = `₹${parseFloat(amount).toFixed(2)}`;
        if (poster) {
            document.getElementById('pageBackdrop').src = `${API_URL}/proxy/image?url=${poster}`;
        }
        document.getElementById('loader').style.display = 'none';

        // Simple Card Formatting
        document.getElementById('cardNumber').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
        });

        document.getElementById('expiry').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{2})/, '$1/').trim();
        });

        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('payBtn');
            const originalText = btn.textContent;
            
            btn.innerHTML = '<span class="loader" style="width:20px; height:20px; border-width:2px; display:inline-block;"></span> PROCESSING...';
            btn.disabled = true;

            try {
                // Simulating network delay for realism
                await new Promise(r => setTimeout(r, 1500));

                await Api.request('/payments', 'POST', {
                    booking_id: bookingId,
                    payment_method: 'Card',
                    amount: parseFloat(amount)
                });
                
                showToast('🎉 Payment successful! Redirecting to history...', false);
                setTimeout(() => window.location.href = 'history.html', 2500);
            } catch (err) {
                showToast(err.message || 'Payment failed. Please try again.', true);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

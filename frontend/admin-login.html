<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CineTick</title>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d1a 100%); }
        .login-wrap { width: 420px; background: var(--card-bg); border-radius: 16px; padding: 2.5rem; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        .login-brand { text-align: center; margin-bottom: 2rem; }
        .login-brand .brand-name { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .login-brand .brand-sub { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; }
        .login-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.8rem; text-align: center; }
        .error-msg { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.3); color: #dc3545; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
        .submit-btn { width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem; }
        .user-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
        .user-link a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <div class="brand-name">🎬 CineTick</div>
            <div class="brand-sub">Admin Control Panel</div>
        </div>
        <h2 class="login-title">Administrator Login</h2>
        <div id="errorMsg" class="error-msg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@cinetick.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary submit-btn">Login to Dashboard</button>
        </form>
        <div class="user-link">Not an admin? <a href="index.html">Go to Main Site</a></div>
    </div>
    <script src="js/admin.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await AdminApi.loginAdmin(email, password);
                if (res.user.role !== 'admin') {
                    errEl.textContent = 'Access denied. This account is not an admin.';
                    errEl.style.display = 'block';
                    return;
                }
                AdminApi.setSession(res.token, res.user);
                window.location.href = 'admin-dashboard.html';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
